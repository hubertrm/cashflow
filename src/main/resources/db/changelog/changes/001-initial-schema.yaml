databaseChangeLog:
  - changeSet:
      id: 001-create-account
      author: hubertrm
      changes:
        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: creation_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-create-category
      author: hubertrm
      changes:
        - createTable:
            tableName: category
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: creation_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 003-create-transaction
      author: hubertrm
      changes:
        - createTable:
            tableName: transaction
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: amount
                  type: real
                  constraints:
                    nullable: false
              - column:
                  name: date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(255)
              - column:
                  name: account_id
                  type: bigint
              - column:
                  name: category_id
                  type: bigint
              - column:
                  name: before_conversion
                  type: real
              - column:
                  name: change_rate
                  type: real
              - column:
                  name: currency
                  type: varchar(255)
              - column:
                  name: holiday
                  type: varchar(255)
              - column:
                  name: is_common
                  type: boolean
              - column:
                  name: month
                  type: varchar(255)
              - column:
                  name: nbr_of_actions
                  type: integer
              - column:
                  name: ticker
                  type: varchar(255)
              - column:
                  name: week_number
                  type: integer
              - column:
                  name: year
                  type: integer
              - column:
                  name: reference
                  type: bigint
        - addForeignKeyConstraint:
            constraintName: fk_transaction_account
            baseTableName: transaction
            baseColumnNames: account_id
            referencedTableName: account
            referencedColumnNames: id
        - addForeignKeyConstraint:
            constraintName: fk_transaction_category
            baseTableName: transaction
            baseColumnNames: category_id
            referencedTableName: category
            referencedColumnNames: id
