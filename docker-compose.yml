services:
  postgres:
    image: postgres:16-alpine
    container_name: cashflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow
    ports:
      - "5432:5432"
    volumes:
      - cashflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow -d cashflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cashflow-pgdata:
