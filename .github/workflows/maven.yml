# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.1

      - name: Set up JDK 21
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '21'
          distribution: 'adopt'
          cache: maven

      - name: Compile (no tests)
        run: mvn -B compile

      - name: Run unit tests
        run: mvn -B test -Djacoco.destFile=target/jacoco-unit.exec

      - name: Run integration tests
        run: mvn -B jacoco:prepare-agent failsafe:integration-test -Pintegration-tests -Djacoco.destFile=target/jacoco-it.exec

      - name: Merge coverage and verify threshold
        run: mvn -B jacoco:merge@merge-coverage jacoco:report jacoco:check